<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lendl Alunan | Analog Devices</title>
  <style>
    :root { --adi-blue:#0067B9; --page-bg:#F5F6F7; --surface:#FFFFFF; --text-primary:#101820; --text-secondary:#686C7D; --border-light:#E5E7EB; }
    [data-theme="dark"] { --page-bg:#0F172A; --surface:#111827; --text-primary:#E5E7EB; --text-secondary:#9CA3AF; --border-light:#1F2937; --adi-blue:#4FA3E3; }
    body { margin:0; padding:24px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--page-bg); color:var(--text-primary); }
    .card { max-width:420px; margin:auto; background:var(--surface); border:1px solid var(--border-light); border-radius:12px; padding:28px; position:relative; }
    .theme-toggle { position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; border:1px solid var(--border-light); background:transparent; cursor:pointer; }
    .adi-logo img { height:28px; display:block; margin-bottom:20px; }
    h1 { margin:0 0 8px; }
    .title { color:var(--text-secondary); margin-bottom:24px; }
    a.button { display:block; text-align:center; padding:14px; margin-bottom:12px; text-decoration:none; border:1px solid var(--adi-blue); color:var(--adi-blue); border-radius:8px; }
    a.button.primary { background:var(--adi-blue); color:#fff; }
  </style>
</head>
<body>
  <div class="card">
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    <a class="adi-logo" href="https://www.analog.com" target="_blank" rel="noopener">
      <img src="adi-logo.svg" alt="Analog Devices" />
    </a>
    <h1>Lendl Alunan</h1>
    <div class="title">Senior Manager, Analog Design Engineering<br/>Data Center and Energy</div>
    <a class="button primary" href="Lendl_Alunan.vcf">Add to Contacts</a>
    <a class="button" href="https://www.linkedin.com/in/lendl-alunan/">LinkedIn</a>
    <a class="button" href="https://www.analog.com">analog.com</a>
  </div>
<script>
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const saved = localStorage.getItem('theme');
function apply(t){document.documentElement.dataset.theme=t;}
apply(saved|| (prefersDark?'dark':'light'));
function toggleTheme(){ const t=document.documentElement.dataset.theme==='dark'?'light':'dark'; apply(t); localStorage.setItem('theme',t); }
</script>
</body>
</html>
